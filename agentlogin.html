<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Login - Black Pearl Tours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0c0b09 0%, #151310 30%, #1a1710 60%, #0f0e0a 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(139,125,75,0.1) 0%, rgba(139,125,75,0.03) 40%, transparent 70%);
      border-radius: 50%;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -25%;
      left: -10%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(196,178,130,0.06) 0%, transparent 60%);
      border-radius: 50%;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 40px 24px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .logo-img {
      height: 160px;
      width: auto;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(196, 178, 130, 0.36));
    }

    .tagline {
      font-family: 'Archivo', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: rgba(196, 178, 130, 0.7);
      font-style: italic;
      margin-bottom: 40px;
      line-height: 1.6;
      padding: 0 10px;
    }

    .login-options {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px 28px;
      background: rgba(139,125,75,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139,125,75,0.15);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
      min-height: 88px;
    }

    .login-card:active {
      transform: scale(0.97);
      background: rgba(139,125,75,0.12);
      border-color: #8B7D4B;
    }

    .login-card:hover {
      background: rgba(139,125,75,0.1);
      border-color: #8B7D4B;
      box-shadow: 0 8px 30px rgba(139,125,75,0.15);
    }

    .login-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .login-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .login-text {
      text-align: left;
      flex: 1;
    }

    .login-card h3 {
      font-family: 'Archivo', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.4;
    }

    .login-arrow {
      color: rgba(196,178,130,0.4);
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .login-card:hover .login-arrow,
    .login-card:active .login-arrow {
      color: rgba(196,178,130,0.8);
      transform: translateX(4px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 40px;
      color: rgba(196,178,130,0.6);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s ease;
      padding: 12px 20px;
      border-radius: 50px;
    }

    .back-link:hover,
    .back-link:active {
      color: #C4B282;
    }

    @media (min-width: 520px) {
      .logo-img { height: 180px; }
      .login-icon {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="/">
      <img src="logo.png" alt="Black Pearl Tours" class="logo-img">
    </a>
    <p class="tagline">"The world is a book &amp; those who do not travel read only a page"</p>

    <div class="login-options">
      <a href="https://online.blackpearlholiday.com/index.php?route=account/login" target="_blank" class="login-card">
        <div class="login-icon"><img src="assets/images/icons/gold/flight.png" alt="Flights"></div>
        <div class="login-text">
          <h3>Flights</h3>
          <p>Charter flights booking system</p>
        </div>
        <span class="login-arrow">&#8594;</span>
      </a>
      <a href="https://agency.blackpearlholiday.com/reseller/auth/" target="_blank" class="login-card">
        <div class="login-icon"><img src="assets/images/icons/gold/hotel.png" alt="Hotels"></div>
        <div class="login-text">
          <h3>Hotels</h3>
          <p>Hotels booking system</p>
        </div>
        <span class="login-arrow">&#8594;</span>
      </a>
    </div>

    <a href="/" class="back-link">&larr; Back to Black Pearl Tours</a>
  </div>

</body>
</html>
